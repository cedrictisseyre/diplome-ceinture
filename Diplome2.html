<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Diplôme de ceinture - Karaté Mix v2</title>
  <style>
    @page {
      size: A4 landscape;
      margin: 0;
    }

    * {
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    body {
      margin: 0;
      background: #d4d4d4;
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* ── Toolbar ── */
    .toolbar {
      text-align: center;
      padding: 10px 0 14px 0;
    }

    .toolbar button {
      background: #1a2e60;
      color: white;
      border: none;
      padding: 10px 30px;
      font-size: 15px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.5px;
      font-family: Arial, sans-serif;
    }

    .toolbar button:hover {
      background: #0f1e40;
    }

    @media print {
      .toolbar {
        display: none;
      }

      body {
        background: white;
      }
    }

    /* ── Page ── */
    .page {
      width: 297mm;
      height: 210mm;
      background: #fdfaf3;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── Bande dorée haut/bas ── */
    .band-top,
    .band-bottom {
      position: absolute;
      left: 0;
      right: 0;
      height: 12mm;
      background: linear-gradient(135deg, #1a2e60 0%, #2a4a9a 50%, #1a2e60 100%);
    }

    .band-top {
      top: 0;
    }

    .band-bottom {
      bottom: 0;
    }

    .band-top::after,
    .band-bottom::before {
      content: "";
      display: block;
      width: 100%;
      height: 1.2mm;
      background: linear-gradient(90deg, transparent, #c8a84b, #f0d080, #c8a84b, transparent);
    }

    .band-top::after {
      margin-top: 10mm;
    }

    .band-bottom::before {
      /* gold line on top of bottom band */
    }

    /* ── Cadre intérieur ── */
    .frame {
      position: absolute;
      top: 14mm;
      left: 14mm;
      right: 14mm;
      bottom: 14mm;
      border: 0.5mm solid #c8a84b;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 2mm;
      border: 0.2mm solid #c8a84b;
      opacity: 0.5;
    }

    /* ── Coins dorés ── */
    .corner {
      position: absolute;
      width: 10mm;
      height: 10mm;
    }

    .corner-tl { top: 13mm; left: 13mm; border-top: 1mm solid #c8a84b; border-left: 1mm solid #c8a84b; }
    .corner-tr { top: 13mm; right: 13mm; border-top: 1mm solid #c8a84b; border-right: 1mm solid #c8a84b; }
    .corner-bl { bottom: 13mm; left: 13mm; border-bottom: 1mm solid #c8a84b; border-left: 1mm solid #c8a84b; }
    .corner-br { bottom: 13mm; right: 13mm; border-bottom: 1mm solid #c8a84b; border-right: 1mm solid #c8a84b; }

    /* ── Logos ── */
    .logo-tl {
      position: absolute;
      top: 13mm;
      left: 13mm;
    }

    .logo-tr {
      position: absolute;
      top: 13mm;
      right: 13mm;
    }

    .logo-bl {
      position: absolute;
      bottom: 13mm;
      left: 13mm;
    }

    .logo-br {
      position: absolute;
      bottom: 13mm;
      right: 13mm;
    }

    /* ── Filet d'or horizontal centré ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 2.5mm;
      width: 100%;
      margin: 3mm 0;
    }

    .divider-line {
      flex: 1;
      height: 0.3mm;
      background: linear-gradient(90deg, transparent, #c8a84b, transparent);
    }

    .divider-ornament {
      color: #c8a84b;
      font-size: 5mm;
      line-height: 1;
    }

    /* ── Contenu central ── */
    .content {
      position: absolute;
      top: 12mm;
      bottom: 12mm;
      left: 60mm;
      right: 60mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .label-federation {
      font-family: Arial, sans-serif;
      font-size: 3.5mm;
      font-weight: 700;
      letter-spacing: 2.5mm;
      color: #c8a84b;
      text-transform: uppercase;
      margin-bottom: 3mm;
    }

    .title-diplome {
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: 11.5mm;
      font-weight: 900;
      color: #1a2e60;
      letter-spacing: 0.8mm;
      line-height: 1;
      margin-bottom: 0.5mm;
    }

    .title-discipline {
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: 7.5mm;
      font-weight: 900;
      color: #1a2e60;
      letter-spacing: 1.5mm;
      margin-bottom: 0;
    }

    .label-decerne {
      font-style: italic;
      font-size: 4.5mm;
      color: #666;
      margin-bottom: 1.5mm;
    }

    .name {
      font-family: Georgia, serif;
      font-size: 10mm;
      font-weight: 700;
      color: #1a2e60;
      min-width: 90mm;
      border-bottom: 0.6mm solid #1a2e60;
      padding: 0 4mm 1mm 4mm;
      margin-bottom: 0;
      outline: none;
      display: inline-block;
      text-align: center;
    }

    .name:focus {
      background: rgba(26, 46, 96, 0.05);
    }

    .label-belt {
      font-size: 3.8mm;
      font-style: italic;
      color: #666;
      margin-bottom: 1.5mm;
    }

    .belt-badge {
      display: inline-block;
      background: #1a2e60;
      color: #f0d080;
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: 7mm;
      font-weight: 900;
      letter-spacing: 2mm;
      text-transform: uppercase;
      padding: 1.5mm 12mm;
      border-radius: 1.5mm;
      border: 0.5mm solid #c8a84b;
      min-width: 55mm;
      text-align: center;
      outline: none;
    }

    .belt-badge:focus {
      background: #2a4090;
    }

    .info-row {
      font-family: Arial, sans-serif;
      font-size: 3.8mm;
      color: #444;
      line-height: 1.7;
    }

    .info-row strong {
      color: #1a2e60;
      font-weight: 700;
    }

    .signature {
      font-family: Arial, sans-serif;
      font-size: 4mm;
      font-weight: 900;
      color: #1a2e60;
      letter-spacing: 0.5mm;
      margin-bottom: 0.5mm;
    }

    .signature-role {
      font-family: Arial, sans-serif;
      font-size: 3.2mm;
      color: #888;
      font-style: italic;
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <button onclick="window.print()">🖨️ Imprimer / Exporter en PDF</button>
  </div>

  <div class="page">

    <!-- Bandes bleues haut/bas -->
    <div class="band-top"></div>
    <div class="band-bottom"></div>

    <!-- Cadre doré -->
    <div class="frame"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Logos dans les 4 coins -->
    <div class="logo-tl">
      <img src="FFK_V_RVB-2.png" alt="Logo FFK" style="width: 44mm; height: auto;" />
    </div>
    <div class="logo-tr">
      <img src="FFK_V_RVB-2.png" alt="Logo FFK" style="width: 44mm; height: auto;" />
    </div>
    <div class="logo-bl">
      <img src="ratel4-noir-rond.png" alt="Logo Club Ratel" style="width: 44mm; height: auto;" />
    </div>
    <div class="logo-br">
      <img src="do-kanji.gif" alt="Idéogramme Do" style="width: 44mm; height: auto;" />
    </div>

    <!-- Contenu central -->
    <div class="content">

      <div class="label-federation">Fédération Française de Karaté</div>

      <div class="title-diplome">DIPLÔME DE CEINTURE</div>
      <div class="title-discipline">DE KARATÉ MIX</div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-ornament">✦</div>
        <div class="divider-line"></div>
      </div>

      <div class="label-decerne">Est décerné à</div>

      <div class="name" contenteditable="true">Delauzun Sacha</div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-ornament">✦</div>
        <div class="divider-line"></div>
      </div>

      <div class="label-belt">pour l'obtention de la ceinture</div>

      <div class="belt-badge" contenteditable="true">Orange</div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-ornament">✦</div>
        <div class="divider-line"></div>
      </div>

      <div class="info-row">
        <strong>Club de MMA La Bouilladisse et Peypin</strong> &nbsp;·&nbsp; le 18 / 06 / 2025
      </div>

      <div class="signature">CÉDRIC TISSEYRE</div>
      <div class="signature-role">6<sup>e</sup> Dan de Karaté Mix — Enseignant</div>

    </div>
  </div>
</body>
</html>
